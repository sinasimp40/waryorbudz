<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" id="meta-description" content="" />
    <meta name="keywords" content="" />
    <meta property="og:title" id="og-title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:type" content="website" />
    <title id="page-title"></title>
    <link rel="icon" id="favicon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <style>
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #09090b;
        overflow: hidden;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      html:not(.dark) #preloader {
        background: #fafafa;
      }
      #preloader.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      #preloader-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 60px 60px;
        mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      }
      html:not(.dark) #preloader-grid {
        background-image:
          linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      }
      #preloader-glow {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, var(--pl-glow, rgba(239,68,68,0.15)) 0%, transparent 70%);
        filter: blur(60px);
        animation: preloader-pulse 3s ease-in-out infinite;
      }
      @keyframes preloader-pulse {
        0%, 100% { transform: scale(0.8); opacity: 0.5; }
        50% { transform: scale(1.2); opacity: 1; }
      }
      #preloader-logo-wrap {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      #preloader-logo-ring {
        position: relative;
        width: 100px;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #preloader-logo-ring::before {
        content: '';
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: var(--pl-accent, #ef4444);
        border-right-color: var(--pl-accent, #ef4444);
        animation: preloader-spin 1.5s linear infinite;
      }
      #preloader-logo-ring::after {
        content: '';
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        border: 1px solid transparent;
        border-bottom-color: rgba(255,255,255,0.1);
        border-left-color: rgba(255,255,255,0.1);
        animation: preloader-spin 2.5s linear infinite reverse;
      }
      @keyframes preloader-spin {
        to { transform: rotate(360deg); }
      }
      #preloader-logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        object-fit: contain;
        opacity: 0;
        animation: preloader-logo-in 0.6s ease forwards 0.2s;
      }
      #preloader-logo-fallback {
        font-size: 28px;
        font-weight: 700;
        font-family: 'JetBrains Mono', monospace;
        color: var(--pl-accent, #ef4444);
        opacity: 0;
        animation: preloader-logo-in 0.6s ease forwards 0.2s;
      }
      @keyframes preloader-logo-in {
        from { opacity: 0; transform: scale(0.5); }
        to { opacity: 1; transform: scale(1); }
      }
      #preloader-name {
        font-family: 'Inter', sans-serif;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.9);
        opacity: 0;
        animation: preloader-fade-up 0.6s ease forwards 0.5s;
      }
      html:not(.dark) #preloader-name {
        color: rgba(0,0,0,0.85);
      }
      @keyframes preloader-fade-up {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      #preloader-bar-wrap {
        position: relative;
        width: 200px;
        height: 2px;
        background: rgba(255,255,255,0.06);
        border-radius: 2px;
        overflow: hidden;
        opacity: 0;
        animation: preloader-fade-up 0.4s ease forwards 0.7s;
      }
      html:not(.dark) #preloader-bar-wrap {
        background: rgba(0,0,0,0.08);
      }
      #preloader-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        border-radius: 2px;
        background: var(--pl-accent, #ef4444);
        box-shadow: 0 0 12px var(--pl-glow, rgba(239,68,68,0.4));
        animation: preloader-slide 1.2s ease-in-out infinite;
      }
      @keyframes preloader-slide {
        0% { left: -40%; }
        100% { left: 100%; }
      }
      #preloader-status {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: 2px;
        color: rgba(255,255,255,0.3);
        text-transform: uppercase;
        opacity: 0;
        animation: preloader-fade-up 0.4s ease forwards 0.9s;
      }
      html:not(.dark) #preloader-status {
        color: rgba(0,0,0,0.35);
      }
      #preloader-scanline {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--pl-accent, rgba(239,68,68,0.3)), transparent);
        animation: preloader-scanline 3s ease-in-out infinite;
      }
      @keyframes preloader-scanline {
        0% { top: 0; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
      #preloader-corners div {
        position: absolute;
        width: 20px;
        height: 20px;
        border-color: rgba(255,255,255,0.08);
        border-style: solid;
        border-width: 0;
      }
      html:not(.dark) #preloader-corners div {
        border-color: rgba(0,0,0,0.1);
      }
      #preloader-corners div:nth-child(1) { top: 20px; left: 20px; border-top-width: 1px; border-left-width: 1px; }
      #preloader-corners div:nth-child(2) { top: 20px; right: 20px; border-top-width: 1px; border-right-width: 1px; }
      #preloader-corners div:nth-child(3) { bottom: 20px; left: 20px; border-bottom-width: 1px; border-left-width: 1px; }
      #preloader-corners div:nth-child(4) { bottom: 20px; right: 20px; border-bottom-width: 1px; border-right-width: 1px; }
    </style>
    <script>
      (function() {
        try {
          var storedTheme = localStorage.getItem('theme');
          if (storedTheme === 'light') {
            document.documentElement.classList.remove('dark');
          } else if (storedTheme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (!prefersDark) {
              document.documentElement.classList.remove('dark');
            }
          }
          var isDark = document.documentElement.classList.contains('dark');
          
          var cached = localStorage.getItem('shopx_theme_cache');
          if (cached) {
            var t = JSON.parse(cached);
            var h = t.h, s = t.s, l = t.l;
            var lightL = Math.max(30, Math.min(50, l - 10));
            var darkL = Math.max(40, Math.min(60, l));
            var currentL = isDark ? darkL : lightL;
            var r = document.documentElement.style;
            r.setProperty('--primary', h + ' ' + s + '% ' + currentL + '%');
            r.setProperty('--ring', h + ' ' + s + '% ' + currentL + '%');
            r.setProperty('--sidebar-primary', h + ' ' + s + '% ' + currentL + '%');
            r.setProperty('--sidebar-ring', h + ' ' + s + '% ' + currentL + '%');
            r.setProperty('--chart-1', h + ' ' + s + '% ' + currentL + '%');
            var accentL = isDark ? 18 : 92;
            var accentS = Math.max(30, s - 30);
            r.setProperty('--accent', h + ' ' + accentS + '% ' + accentL + '%');
            r.setProperty('--sidebar-accent', h + ' ' + Math.max(20, s - 40) + '% ' + (isDark ? 15 : 90) + '%');

            var hslColor = 'hsl(' + h + ',' + s + '%,' + currentL + '%)';
            var hslGlow = 'hsla(' + h + ',' + s + '%,' + currentL + '%,0.15)';
            var hslGlow4 = 'hsla(' + h + ',' + s + '%,' + currentL + '%,0.4)';
            var hslGlow3 = 'hsla(' + h + ',' + s + '%,' + currentL + '%,0.3)';
            document.documentElement.style.setProperty('--pl-accent', hslColor);
            document.documentElement.style.setProperty('--pl-glow', hslGlow);
          }
          
          var shopCache = localStorage.getItem('shopx_settings_cache');
          if (shopCache) {
            var shop = JSON.parse(shopCache);
            if (shop.name) {
              document.title = shop.name;
              var titleEl = document.getElementById('page-title');
              if (titleEl) titleEl.textContent = shop.name;
              var ogTitle = document.getElementById('og-title');
              if (ogTitle) ogTitle.setAttribute('content', shop.name);
              var metaDesc = document.getElementById('meta-description');
              if (metaDesc) metaDesc.setAttribute('content', shop.name + ' - Your trusted shop for gift cards, rewards points, and premium digital products. Secure crypto payments accepted.');
              var nameEl = document.getElementById('preloader-name');
              if (nameEl) nameEl.textContent = shop.name;
            }
            if (shop.logo) {
              var favicon = document.getElementById('favicon');
              if (favicon) favicon.href = shop.logo;
              var logoEl = document.getElementById('preloader-logo');
              if (logoEl) {
                logoEl.src = shop.logo;
                logoEl.style.display = 'block';
              }
              var fallback = document.getElementById('preloader-logo-fallback');
              if (fallback) fallback.style.display = 'none';
            }
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="preloader" role="status" aria-label="Loading application">
      <div id="preloader-grid"></div>
      <div id="preloader-glow"></div>
      <div id="preloader-scanline"></div>
      <div id="preloader-corners"><div></div><div></div><div></div><div></div></div>
      <div id="preloader-logo-wrap">
        <div id="preloader-logo-ring">
          <img id="preloader-logo" src="" alt="" style="display:none" />
          <span id="preloader-logo-fallback">&gt;_</span>
        </div>
        <div id="preloader-name">Loading</div>
        <div id="preloader-bar-wrap"><div id="preloader-bar"></div></div>
        <div id="preloader-status">Initializing</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
